name: Verify Railway Docker build

on:
  push:
    branches: [master]
    paths:
      - "backend/**"
      - "Dockerfile"
      - "railway.json"
      - "railway.toml"
      - ".github/workflows/railway-docker-build.yml"
  pull_request:
    paths:
      - "backend/**"
      - "Dockerfile"
      - "railway.json"
      - "railway.toml"
      - ".github/workflows/railway-docker-build.yml"

permissions:
  contents: read
  packages: write

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Railway image (repo root Dockerfile)
        run: docker build -f Dockerfile . -t reading-task-board-api-railway

      - name: Build docker-compose image (backend context)
        run: docker build -f backend/Dockerfile backend -t reading-task-board-api

      - name: Smoke test container
        run: |
          docker run -d --name api-test -p 8000:8000 \
            -e JWT_SECRET=ci-test-secret-key-for-github-actions \
            -e DB_HOST=127.0.0.1 \
            -e DB_PASSWORD=unused \
            reading-task-board-api-railway
          sleep 3
          curl -sf http://127.0.0.1:8000/health
          docker stop api-test

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/reading-task-board-api
          docker tag reading-task-board-api-railway "${IMAGE}:latest"
          docker tag reading-task-board-api-railway "${IMAGE}:${{ github.sha }}"
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${{ github.sha }}"

  deploy-railway:
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:latest
    steps:
      - name: Redeploy Railway (pre-built Docker image)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ vars.RAILWAY_SERVICE_ID }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ] || [ -z "$RAILWAY_SERVICE_ID" ]; then
            echo "Skip: set GitHub Secrets RAILWAY_TOKEN and Variables RAILWAY_SERVICE_ID (see DEPLOY.md §4-6)."
            exit 0
          fi
          railway redeploy --service="$RAILWAY_SERVICE_ID" -y
